indentation: 4
column-limit: 80
function-arrows: leading
comma-style: leading
import-export-style: leading
indent-wheres: true
record-brace-space: true
newlines-between-decls: 1
haddock-style: single-line
haddock-style-module: single-line
haddock-location-signature: leading
let-style: auto
in-style: no-space
single-constraint-parens: auto
single-deriving-parens: auto
unicode: never
respectful: true
fixities: []
import-grouping: preserve
record-style: aligned
if-style: indented
sort-constraints: false
sort-derived-classes: false
sort-deriving-clauses: false
trailing-section-operators: true
